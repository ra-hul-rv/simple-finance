services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: simplefinance
      POSTGRES_PASSWORD: simplefinance_secret
      POSTGRES_DB: simplefinance
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplefinance -d simplefinance"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_dev_data:
    driver: local
